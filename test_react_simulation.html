<!DOCTYPE html>
<html>
<head>
    <title>React Registration Simulation Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; max-height: 400px; }
        .step { margin: 10px 0; padding: 10px; border-left: 4px solid #007bff; background-color: #f8f9fa; }
    </style>
</head>
<body>
    <h1>🏥 React Registration Simulation Test</h1>
    
    <div class="test-section info">
        <h2>📋 Test Plan</h2>
        <p>This test simulates exactly how the React app registers a user:</p>
        <ol>
            <li>Test API connectivity</li>
            <li>Simulate React registration request</li>
            <li>Test login with created user</li>
            <li>Verify complete workflow</li>
        </ol>
    </div>

    <div class="test-section">
        <h2>🧪 Step-by-Step Test</h2>
        <button onclick="runCompleteTest()">Run Complete Test</button>
        <button onclick="clearResults()">Clear Results</button>
        <div id="test-results"></div>
    </div>

    <div class="test-section">
        <h2>🚀 Quick Actions</h2>
        <button onclick="testApiConnection()">Test API Connection</button>
        <button onclick="simulateReactRegistration()">Simulate React Registration</button>
        <button onclick="testLoginAfterRegistration()">Test Login After Registration</button>
        <button onclick="openReactApp()">Open React App</button>
        <div id="quick-results"></div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        let testUser = null;

        async function runCompleteTest() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<div class="info"><h3>🔄 Running Complete Test...</h3></div>';
            
            try {
                // Step 1: Test API Connection
                await addTestResult('Step 1: Testing API Connection', async () => {
                    const response = await fetch(`${API_BASE}/doctors/`);
                    const data = await response.json();
                    return { success: response.ok, data: `Found ${data.count} doctors` };
                });

                // Step 2: Simulate React Registration
                await addTestResult('Step 2: Simulating React Registration', async () => {
                    const timestamp = Date.now();
                    const userData = {
                        username: `react_test_${timestamp}`,
                        email: `react_test_${timestamp}@email.com`,
                        first_name: 'React',
                        last_name: 'Test',
                        password: 'password123',
                        password_confirm: 'password123',
                        role: 'PATIENT',
                        phone: '',
                        date_of_birth: '',
                        address: ''
                    };

                    const response = await fetch(`${API_BASE}/auth/register/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Origin': 'http://localhost:3000'
                        },
                        body: JSON.stringify(userData)
                    });
                    
                    const data = await response.json();
                    testUser = data.user;
                    return { 
                        success: response.ok, 
                        data: `User created: ${data.user.username} (ID: ${data.user.id})`,
                        fullData: data
                    };
                });

                // Step 3: Test Login with Created User
                await addTestResult('Step 3: Testing Login with Created User', async () => {
                    if (!testUser) throw new Error('No test user available');
                    
                    const response = await fetch(`${API_BASE}/auth/login/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Origin': 'http://localhost:3000'
                        },
                        body: JSON.stringify({
                            email: testUser.email,
                            password: 'password123'
                        })
                    });
                    
                    const data = await response.json();
                    return { 
                        success: response.ok, 
                        data: `Login successful for ${data.user.full_name}`,
                        tokens: { access: data.access?.substring(0, 50) + '...' }
                    };
                });

                // Step 4: Test Protected API Access
                await addTestResult('Step 4: Testing Protected API Access', async () => {
                    if (!testUser) throw new Error('No test user available');
                    
                    // First login to get token
                    const loginResponse = await fetch(`${API_BASE}/auth/login/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: testUser.email,
                            password: 'password123'
                        })
                    });
                    const loginData = await loginResponse.json();
                    
                    // Test protected endpoint
                    const response = await fetch(`${API_BASE}/appointments/`, {
                        headers: {
                            'Authorization': `Bearer ${loginData.access}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    const data = await response.json();
                    return { 
                        success: response.ok, 
                        data: `Protected API access successful. Found ${data.count || data.results?.length || 0} appointments`
                    };
                });

                resultsDiv.innerHTML += '<div class="success"><h3>✅ Complete Test Finished Successfully!</h3><p>All steps completed. The registration system is working perfectly.</p></div>';

            } catch (error) {
                resultsDiv.innerHTML += `<div class="error"><h3>❌ Test Failed!</h3><p>${error.message}</p></div>`;
            }
        }

        async function addTestResult(stepName, testFunction) {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML += `<div class="step"><strong>${stepName}...</strong></div>`;
            
            try {
                const result = await testFunction();
                const statusClass = result.success ? 'success' : 'error';
                resultsDiv.innerHTML += `<div class="${statusClass}"><h4>${result.success ? '✅' : '❌'} ${stepName}</h4><p>${result.data}</p></div>`;
                if (result.fullData) {
                    resultsDiv.innerHTML += `<pre>${JSON.stringify(result.fullData, null, 2)}</pre>`;
                }
            } catch (error) {
                resultsDiv.innerHTML += `<div class="error"><h4>❌ ${stepName}</h4><p>${error.message}</p></div>`;
            }
        }

        async function testApiConnection() {
            const resultsDiv = document.getElementById('quick-results');
            try {
                const response = await fetch(`${API_BASE}/doctors/`);
                const data = await response.json();
                resultsDiv.innerHTML = `
                    <div class="success">
                        <h3>✅ API Connection Successful</h3>
                        <p>Status: ${response.status}</p>
                        <p>Found ${data.count} doctors</p>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ API Connection Failed</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function simulateReactRegistration() {
            const resultsDiv = document.getElementById('quick-results');
            const timestamp = Date.now();
            const userData = {
                username: `react_sim_${timestamp}`,
                email: `react_sim_${timestamp}@email.com`,
                first_name: 'React',
                last_name: 'Simulation',
                password: 'password123',
                password_confirm: 'password123',
                role: 'PATIENT',
                phone: '',
                date_of_birth: '',
                address: ''
            };

            try {
                const response = await fetch(`${API_BASE}/auth/register/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': 'http://localhost:3000'
                    },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    testUser = data.user;
                    resultsDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ React Registration Simulation Successful!</h3>
                            <p>User Created: ${data.user.username}</p>
                            <p>Email: ${data.user.email}</p>
                            <p>User ID: ${data.user.id}</p>
                            <p>Access Token: ${data.access.substring(0, 50)}...</p>
                            <button onclick="testLoginAfterRegistration()">Test Login →</button>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Registration Failed</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Network Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function testLoginAfterRegistration() {
            const resultsDiv = document.getElementById('quick-results');
            if (!testUser) {
                resultsDiv.innerHTML = '<div class="error"><h3>❌ No Test User Available</h3><p>Please run registration first.</p></div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/login/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': 'http://localhost:3000'
                    },
                    body: JSON.stringify({
                        email: testUser.email,
                        password: 'password123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultsDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Login Successful!</h3>
                            <p>Welcome: ${data.user.full_name}</p>
                            <p>Role: ${data.user.role}</p>
                            <p>Access Token: ${data.access.substring(0, 50)}...</p>
                            <button onclick="openReactApp()">Test in React App →</button>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Login Failed</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Login Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function clearResults() {
            document.getElementById('test-results').innerHTML = '';
            document.getElementById('quick-results').innerHTML = '';
            testUser = null;
        }

        function openReactApp() {
            window.open('http://localhost:3000', '_blank');
        }

        // Auto-run API connection test on page load
        window.onload = function() {
            testApiConnection();
        };
    </script>
</body>
</html>
